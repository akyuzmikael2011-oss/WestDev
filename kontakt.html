<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Kontakt | WestDev Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg-primary:#f3f8ff;
      --bg-secondary:#dceeff;

      --text-primary:#07111f;
      --text-secondary:#45607e;

      --glass:rgba(255,255,255,0.35);
      --glass-border:rgba(255,255,255,0.5);

      --accent:#4db1ff;
      --accent-dark:#006fff;

      --shadow:rgba(0,0,0,0.08);
    }

    @media(prefers-color-scheme:dark){

      :root{

        --bg-primary:#07111f;
        --bg-secondary:#08192d;

        --text-primary:#f3f7ff;
        --text-secondary:#91a8c2;

        --glass:rgba(10,20,35,0.45);
        --glass-border:rgba(255,255,255,0.08);

        --accent:#5cbcff;
        --accent-dark:#1977ff;

        --shadow:rgba(0,0,0,0.35);
      }

    }

    body{

      font-family:'Inter',sans-serif;

      min-height:100vh;

      background:
      radial-gradient(circle at top left, rgba(0,132,255,0.2), transparent 30%),
      radial-gradient(circle at bottom right, rgba(82,167,255,0.18), transparent 30%),
      linear-gradient(135deg,var(--bg-primary),var(--bg-secondary));

      color:var(--text-primary);

      overflow:hidden;
    }

    body::before{

      content:"";

      position:fixed;
      inset:0;

      backdrop-filter:blur(100px);

      z-index:-1;
    }

    .navbar{

      position:fixed;

      top:20px;
      left:50%;

      transform:translateX(-50%);

      width:calc(100% - 40px);
      max-width:1200px;

      padding:18px 28px;

      background:var(--glass);

      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);

      border:1px solid var(--glass-border);

      border-radius:24px;

      box-shadow:0 8px 32px var(--shadow);

      display:flex;
      justify-content:space-between;
      align-items:center;

      z-index:999;
    }

    .logo{

      display:flex;
      align-items:center;
      gap:12px;

      font-size:1.1rem;
      font-weight:800;

      letter-spacing:-0.03em;
    }

    .logo-box{

      width:42px;
      height:42px;

      border-radius:14px;

      background:linear-gradient(135deg,var(--accent),var(--accent-dark));

      display:flex;
      justify-content:center;
      align-items:center;

      color:white;
      font-weight:800;

      box-shadow:0 8px 20px rgba(0,119,255,0.25);
    }

    .nav-links{

      display:flex;
      gap:26px;
      align-items:center;
    }

    .nav-links a{

      text-decoration:none;

      color:var(--text-secondary);

      font-weight:600;

      transition:0.25s ease;
    }

    .nav-links a:hover{
      color:var(--text-primary);
    }

    .page{

      width:100%;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:140px 20px 40px;
    }

    .contact-card{

      width:100%;
      max-width:760px;

      background:var(--glass);

      border:1px solid var(--glass-border);

      backdrop-filter:blur(35px);
      -webkit-backdrop-filter:blur(35px);

      border-radius:36px;

      padding:45px;

      box-shadow:0 20px 50px var(--shadow);

      position:relative;
      overflow:hidden;

      text-align:center;
    }

    .contact-card::before{

      content:"";

      position:absolute;

      width:220px;
      height:220px;

      right:-80px;
      top:-80px;

      background:rgba(61,165,255,0.18);

      border-radius:50%;

      filter:blur(45px);
    }

    .badge{

      display:inline-block;

      background:rgba(255,255,255,0.12);

      border:1px solid rgba(255,255,255,0.08);

      padding:10px 16px;

      border-radius:999px;

      color:var(--text-secondary);

      font-size:0.9rem;
      font-weight:700;

      margin-bottom:24px;
    }

    h1{

      font-size:clamp(3rem,6vw,5rem);

      line-height:0.95;

      letter-spacing:-0.06em;

      margin-bottom:20px;
    }

    .gradient-text{

      background:linear-gradient(135deg,var(--accent),var(--accent-dark));

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{

      color:var(--text-secondary);

      font-size:1.08rem;

      line-height:1.8;

      margin-bottom:38px;
    }

    .contact-box{

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:28px;

      padding:28px;

      margin-bottom:28px;
    }

    .contact-label{

      color:var(--text-secondary);

      font-size:0.95rem;

      margin-bottom:8px;
    }

    .contact-value{

      font-size:1.2rem;
      font-weight:700;

      word-break:break-word;
    }

    .contact-value a{

      color:var(--text-primary);

      text-decoration:none;
    }

    .contact-value a:hover{

      color:var(--accent-dark);
    }

    .mail-button{

      display:inline-block;

      padding:16px 24px;

      border-radius:18px;

      background:linear-gradient(135deg,var(--accent),var(--accent-dark));

      color:white;

      text-decoration:none;

      font-weight:800;

      box-shadow:0 10px 25px rgba(0,119,255,0.27);

      transition:0.25s ease;
    }

    .mail-button:hover{
      transform:translateY(-2px);
    }

    @media(max-width:820px){

      .nav-links{
        display:none;
      }

      .contact-card{
        padding:35px 24px;
      }

    }

  </style>

</head>
<body>

  <nav class="navbar">

    <div class="logo">

      <div class="logo-box">WD</div>

      <span>WestDev Solutions</span>

    </div>

    <div class="nav-links">

      <a href="index.html">Start</a>
      <a href="pakete.html">Pakete</a>
      <a href="kontakt.html">Kontakt</a>

    </div>

  </nav>

  <main class="page">

    <div class="contact-card">

      <div class="badge">
        Kontakt & Auftragsanfragen
      </div>

      <h1>
        Kontaktieren Sie <span class="gradient-text">uns</span>
      </h1>

      <p class="subtitle">
        Bitte schreiben Sie mir eine E-Mail und ich werde Ihnen
        mit Ihrer Auftragsbestätigung antworten.
      </p>

      <div class="contact-box">

        <div class="contact-label">
          Ansprechpartner
        </div>

        <div class="contact-value">
          Mikael Akyüz
        </div>

      </div>

      <div class="contact-box">

        <div class="contact-label">
          E-Mail
        </div>

        <div class="contact-value">
          <a href="mailto:westdevsolutions@yahoo.com">
            westdevsolutions@yahoo.com
          </a>
        </div>

      </div>

      <a class="mail-button" href="mailto:westdevsolutions@yahoo.com">
        E-Mail schreiben
      </a>

    </div>

  </main>

</body>
</html>
