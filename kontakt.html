<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kontakt | WestDev Solutions</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }

    /* STANDARD: LIGHT MODE */
    :root {
      --bg-primary: #f3f8ff;
      --bg-secondary: #dceeff;
      --text-primary: #07111f;
      --text-secondary: #45607e;
      --glass: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.5);
      --accent: #4db1ff;
      --accent-dark: #006fff;
      --shadow: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.5);
    }

    /* AUTOMATISCHE ERKENNUNG: DARK MODE */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #07111f;
        --bg-secondary: #08192d;
        --text-primary: #f2f7ff;
        --text-secondary: #8fa8c4;
        --glass: rgba(10, 20, 35, 0.45);
        --glass-border: rgba(255, 255, 255, 0.08);
        --accent: #5cbfff;
        --accent-dark: #1a77ff;
        --shadow: rgba(0, 0, 0, 0.35);
        --input-bg: rgba(255, 255, 255, 0.05);
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, rgba(0,132,255,0.15), transparent 30%), 
                  linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      min-height: 100vh;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    .navbar {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 1200px;
      padding: 18px 28px; background: var(--glass); backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border); border-radius: 24px;
      display: flex; justify-content: space-between; align-items: center; z-index: 999;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; }
    .logo-box { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display: flex; justify-content: center; align-items: center; color: white; }

    .nav-links { display: flex; gap: 25px; }
    .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 600; transition: 0.3s; }
    .nav-links a:hover { color: var(--text-primary); }

    .page { padding: 140px 20px 60px; display: flex; justify-content: center; align-items: center; flex-grow: 1; }

    .contact-card {
      width: 100%; max-width: 600px;
      background: var(--glass); backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border); border-radius: 34px;
      padding: 40px; box-shadow: 0 20px 50px var(--shadow);
    }

    h1 { font-size: 2.5rem; letter-spacing: -0.05em; margin-bottom: 10px; text-align: center; }
    .gradient-text { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 35px; line-height: 1.6; }

    form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: 700; font-size: 0.9rem; color: var(--text-secondary); padding-left: 5px; }

    input, textarea, select {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      padding: 15px; border-radius: 15px;
      color: var(--text-primary); font-family: inherit; font-size: 1rem;
      transition: 0.3s;
    }

    /* Damit die Optionen im Dropdown lesbar bleiben */
    select option { background: var(--bg-secondary); color: var(--text-primary); }

    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent); background: rgba(255,255,255,0.1);
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white; border: none; padding: 18px; border-radius: 18px;
      font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,119,255,0.2);
    }

    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,119,255,0.3); }

    @media(max-width:600px){
      .contact-card { padding: 30px 20px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <div class="logo-box">WD</div>
      <span>WestDev Solutions</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Start</a>
      <a href="pakete.html">Pakete</a>
      <a href="kontakt.html">Kontakt</a>
    </div>
  </nav>

  <main class="page">
    <div class="contact-card">
      <h1>Projekt <span class="gradient-text">starten</span></h1>
      <p class="subtitle">Wähle dein Paket. Ich melde mich innerhalb von 24h!</p>

      <form action="https://formspree.io/f/xzdooolj" method="POST">
        
        <div class="form-group">
          <label>Deine E-Mail Adresse:</label>
          <input type="email" name="email" required placeholder="ihre@mail.de">
        </div>

        <div class="form-group">
          <label>Welches Paket?</label>
          <select name="paket" required>
            <option value="Normal">Normal Paket (300€)</option>
            <option value="Plus">Plus Paket (500€)</option>
            <option value="Premium">Premium Paket (740€)</option>
            <option value="Individuell">Individuelle Anfrage</option>
          </select>
        </div>

        <div class="form-group">
          <label>Deine Nachricht:</label>
          <textarea name="message" rows="4" required placeholder="Was kann ich für dich tun?"></textarea>
        </div>

        <button type="submit" class="submit-btn">Absenden</button>

      </form>
    </div>
  </main>

</body>
</html>
